version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
    groups:
      all:
        patterns:
          - "*"
    ignore:
      - dependency-name: "python"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
    groups:
      all:
        patterns:
          - "*"